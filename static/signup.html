<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PassPort - Registro</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <h1>PassPort</h1>
                <p>Crea tu cuenta</p>
            </div>

            <div id="alert" class="alert"></div>

            <form id="signupForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="tu@email.com">
                </div>
                <div class="form-group">
                    <label for="password">Contrasena</label>
                    <input type="password" id="password" required placeholder="Min. 8 caracteres">
                </div>
                <div class="form-group">
                    <label for="confirm">Confirmar contrasena</label>
                    <input type="password" id="confirm" required placeholder="Repeti tu contrasena">
                </div>

                <button type="submit" class="btn btn-primary">Registrarse</button>
            </form>

            <div class="link">
                Ya tenes cuenta? <a href="/">Inicia sesion</a>
            </div>
        </div>
    </div>

    <script>
        let csrfToken = '';

        async function loadCsrf() {
            const res = await fetch('/api/csrf-token', { credentials: 'include' });
            const data = await res.json();
            csrfToken = data.csrf_token;
        }

        function showAlert(msg, type) {
            const el = document.getElementById('alert');
            el.textContent = msg;
            el.className = 'alert alert-' + type;
            el.style.display = 'block';
        }

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;

            if (password !== confirm) {
                showAlert('Las contrasenas no coinciden', 'error');
                return;
            }

            try {
                const res = await fetch('/api/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': csrfToken
                    },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    const msg = data.detail || (data[0] && data[0].msg) || 'Error al registrarse';
                    showAlert(msg, 'error');
                    await loadCsrf();
                    return;
                }

                showAlert('Cuenta creada. Redirigiendo...', 'success');
                setTimeout(() => { window.location.href = '/'; }, 1500);
            } catch {
                showAlert('Error de conexion', 'error');
            }
        });

        loadCsrf();
    </script>
</body>
</html>
