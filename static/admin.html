<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PassPort - Admin</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container wide">
        <div class="card">
            <div class="logo">
                <h1>PassPort Admin</h1>
                <p>Panel de administracion</p>
            </div>

            <div id="alert" class="alert"></div>

            <div class="nav-links" style="margin-bottom:1rem">
                <button class="btn btn-secondary" onclick="window.location.href='/dashboard'">
                    Dashboard
                </button>
                <button class="btn btn-primary" onclick="logout()">Cerrar sesion</button>
            </div>

            <h3 class="section-title">Usuarios registrados</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Email</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="usersTable"></tbody>
            </table>

            <h3 class="section-title">Intentos de login (ultimos 100)</h3>
            <table>
                <thead>
                    <tr>
                        <th>Email</th>
                        <th>IP</th>
                        <th>Resultado</th>
                        <th>Fecha</th>
                    </tr>
                </thead>
                <tbody id="attemptsTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        let csrfToken = '';

        async function authFetch(url, options = {}) {
            const token = localStorage.getItem('jwt_token');
            if (token) {
                options.headers = options.headers || {};
                options.headers['Authorization'] = 'Bearer ' + token;
            }
            return fetch(url, { ...options, credentials: 'include' });
        }

        async function loadCsrf() {
            const res = await fetch('/api/csrf-token', { credentials: 'include' });
            const data = await res.json();
            csrfToken = data.csrf_token;
        }

        function showAlert(msg, type) {
            const el = document.getElementById('alert');
            el.textContent = msg;
            el.className = 'alert alert-' + type;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 3000);
        }

        async function loadUsers() {
            const res = await authFetch('/api/admin/users');
            if (res.status === 403 || res.status === 401) {
                window.location.href = '/';
                return;
            }
            const users = await res.json();
            const tbody = document.getElementById('usersTable');
            tbody.innerHTML = '';
            users.forEach(u => {
                const tr = document.createElement('tr');

                const tdId = document.createElement('td');
                tdId.textContent = u.id;

                const tdEmail = document.createElement('td');
                tdEmail.textContent = u.email;

                const tdRole = document.createElement('td');
                tdRole.textContent = u.role;

                const tdActive = document.createElement('td');
                tdActive.textContent = u.is_active ? 'Activo' : 'Inactivo';

                const tdActions = document.createElement('td');
                if (u.role !== 'admin') {
                    const btn = document.createElement('button');
                    btn.textContent = 'Eliminar';
                    btn.className = 'btn btn-danger';
                    btn.onclick = () => deleteUser(u.id, u.email);
                    tdActions.appendChild(btn);
                }

                tr.appendChild(tdId);
                tr.appendChild(tdEmail);
                tr.appendChild(tdRole);
                tr.appendChild(tdActive);
                tr.appendChild(tdActions);
                tbody.appendChild(tr);
            });
        }

        async function loadAttempts() {
            const res = await authFetch('/api/admin/login-attempts');
            if (!res.ok) return;
            const attempts = await res.json();
            const tbody = document.getElementById('attemptsTable');
            tbody.innerHTML = '';
            attempts.forEach(a => {
                const tr = document.createElement('tr');

                const tdEmail = document.createElement('td');
                tdEmail.textContent = a.email;

                const tdIp = document.createElement('td');
                tdIp.textContent = a.ip_address;

                const tdResult = document.createElement('td');
                tdResult.textContent = a.success ? 'Exitoso' : 'Fallido';
                tdResult.className = a.success ? 'badge-success' : 'badge-fail';

                const tdDate = document.createElement('td');
                tdDate.textContent = new Date(a.timestamp).toLocaleString();

                tr.appendChild(tdEmail);
                tr.appendChild(tdIp);
                tr.appendChild(tdResult);
                tr.appendChild(tdDate);
                tbody.appendChild(tr);
            });
        }

        async function deleteUser(id, email) {
            if (!confirm('Eliminar usuario ' + email + '?')) return;
            const res = await authFetch('/api/admin/users/' + id, {
                method: 'DELETE',
                headers: { 'X-CSRF-Token': csrfToken }
            });
            const data = await res.json();
            if (res.ok) {
                showAlert(data.message, 'success');
                loadUsers();
            } else {
                showAlert(data.detail || 'Error', 'error');
            }
            await loadCsrf();
        }

        async function logout() {
            await fetch('/api/logout', { method: 'POST', credentials: 'include' });
            localStorage.removeItem('jwt_token');
            localStorage.removeItem('auth_type');
            window.location.href = '/';
        }

        async function init() {
            await loadCsrf();
            await loadUsers();
            await loadAttempts();
        }

        init();
    </script>
</body>
</html>
